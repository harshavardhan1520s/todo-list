<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasko — Daily Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #16161d;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --accent: #c8a96e;
    --accent2: #e8c98a;
    --pending-color: #6ea8c8;
    --complete-color: #7ec8a0;
    --danger: #c86e6e;
    --text: #f0ede8;
    --text2: #9997a0;
    --text3: #5a5870;
    --radius: 14px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(200,169,110,0.07) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -100px; right: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(110,168,200,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .app {
    max-width: 780px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative; z-index: 1;
  }

  /* Header */
  .header {
    margin-bottom: 40px;
  }
  .header-top {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 6px;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -1px;
    line-height: 1;
  }
  .logo-dot { color: var(--accent2); }
  .tagline {
    font-size: 13px;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .date-display {
    font-size: 14px;
    color: var(--text2);
    margin-top: 8px;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 8px 18px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: border-color 0.2s;
  }
  .stat-pill .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-total { background: var(--accent); }
  .dot-pending { background: var(--pending-color); }
  .dot-done { background: var(--complete-color); }
  .stat-num { font-weight: 600; color: var(--text); }
  .stat-label { color: var(--text2); }

  /* Input area */
  .input-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 36px;
    box-shadow: var(--shadow);
    transition: border-color 0.3s;
  }
  .input-area:focus-within {
    border-color: var(--accent);
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .task-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    resize: none;
    min-height: 50px;
    max-height: 120px;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  .task-input::placeholder { color: var(--text3); }
  .task-input:focus { border-color: var(--accent); }
  .add-btn {
    background: var(--accent);
    color: #1a1508;
    border: none;
    border-radius: 10px;
    width: 50px; height: 50px;
    font-size: 22px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    transition: background 0.2s, transform 0.1s;
  }
  .add-btn:hover { background: var(--accent2); transform: scale(1.05); }
  .add-btn:active { transform: scale(0.97); }
  .input-hint {
    font-size: 12px;
    color: var(--text3);
    margin-top: 10px;
  }

  /* Sections */
  .section { margin-bottom: 36px; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .section-title.pending { color: var(--pending-color); }
  .section-title.completed { color: var(--complete-color); }
  .section-count {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 12px;
    color: var(--text2);
    font-weight: 600;
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Task card */
  .task-list { display: flex; flex-direction: column; gap: 10px; }

  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: border-color 0.2s, transform 0.15s, opacity 0.3s;
    animation: slideIn 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .task-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }
  .task-card.pending::before { background: var(--pending-color); }
  .task-card.completed::before { background: var(--complete-color); }

  .task-card:hover { border-color: var(--border); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .task-card.completed { opacity: 0.75; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideOut {
    from { opacity: 1; transform: translateX(0); max-height: 200px; }
    to   { opacity: 0; transform: translateX(-16px); max-height: 0; padding: 0; margin: 0; }
  }
  .task-card.removing {
    animation: slideOut 0.3s ease forwards;
  }

  /* Checkbox */
  .task-check {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
    transition: border-color 0.2s, background 0.2s;
  }
  .task-check:hover { border-color: var(--complete-color); }
  .task-card.completed .task-check {
    background: var(--complete-color);
    border-color: var(--complete-color);
  }
  .task-check svg { display: none; }
  .task-card.completed .task-check svg { display: block; }

  /* Task content */
  .task-body { flex: 1; min-width: 0; }
  .task-text {
    font-size: 15px;
    color: var(--text);
    line-height: 1.5;
    word-break: break-word;
    transition: color 0.2s;
  }
  .task-card.completed .task-text {
    text-decoration: line-through;
    color: var(--text2);
  }
  .task-meta {
    margin-top: 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px 16px;
  }
  .meta-item {
    font-size: 11px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .meta-item svg { opacity: 0.6; }

  /* Edit area */
  .edit-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    resize: none;
    min-height: 42px;
    line-height: 1.5;
  }
  .edit-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .btn-save, .btn-cancel {
    border: none;
    border-radius: 6px;
    padding: 5px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-save { background: var(--accent); color: #1a1508; }
  .btn-cancel { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-save:hover, .btn-cancel:hover { opacity: 0.85; }

  /* Action buttons */
  .task-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .task-card:hover .task-actions { opacity: 1; }
  .action-btn {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .action-btn.edit:hover { background: rgba(200,169,110,0.15); color: var(--accent); border-color: var(--accent); }
  .action-btn.delete:hover { background: rgba(200,110,110,0.15); color: var(--danger); border-color: var(--danger); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 32px 20px;
    color: var(--text3);
    font-size: 14px;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
  }
  .empty-icon { font-size: 28px; margin-bottom: 8px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 500px) {
    .logo { font-size: 34px; }
    .task-actions { opacity: 1; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="logo">Tasko<span class="logo-dot">.</span></div>
    </div>
    <div class="tagline">Daily Task Manager</div>
    <div class="date-display" id="dateDisplay"></div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-pill">
      <span class="dot dot-total"></span>
      <span class="stat-num" id="stat-total">0</span>
      <span class="stat-label">Total Tasks</span>
    </div>
    <div class="stat-pill">
      <span class="dot dot-pending"></span>
      <span class="stat-num" id="stat-pending">0</span>
      <span class="stat-label">Pending</span>
    </div>
    <div class="stat-pill">
      <span class="dot dot-done"></span>
      <span class="stat-num" id="stat-done">0</span>
      <span class="stat-label">Completed</span>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea class="task-input" id="taskInput" placeholder="What needs to get done today?" rows="1"></textarea>
      <button class="add-btn" id="addBtn" title="Add Task">+</button>
    </div>
    <div class="input-hint">Press Enter or click + to add &nbsp;·&nbsp; Shift+Enter for new line</div>
  </div>

  <!-- Pending Tasks -->
  <div class="section" id="pendingSection">
    <div class="section-header">
      <div class="section-title pending">Pending Tasks</div>
      <div class="section-count" id="pendingCount">0</div>
      <div class="section-line"></div>
    </div>
    <div class="task-list" id="pendingList">
      <div class="empty-state" id="pendingEmpty">
        <div class="empty-icon">📋</div>
        No pending tasks — add one above!
      </div>
    </div>
  </div>

  <!-- Completed Tasks -->
  <div class="section" id="completedSection">
    <div class="section-header">
      <div class="section-title completed">Completed Tasks</div>
      <div class="section-count" id="completedCount">0</div>
      <div class="section-line"></div>
    </div>
    <div class="task-list" id="completedList">
      <div class="empty-state" id="completedEmpty">
        <div class="empty-icon">✅</div>
        No completed tasks yet. You've got this!
      </div>
    </div>
  </div>

</div>

<script>
  // ── State ──────────────────────────────────────────────
  let tasks = JSON.parse(localStorage.getItem('tasko_tasks') || '[]');
  let editingId = null;

  // ── Helpers ────────────────────────────────────────────
  function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 5); }

  function fmtDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
      + ' · ' + d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
  }

  function save() { localStorage.setItem('tasko_tasks', JSON.stringify(tasks)); }

  function iconSVG(type, size = 12) {
    if (type === 'check') return `<svg width="${size}" height="${size}" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    if (type === 'clock') return `<svg width="${size}" height="${size}" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/><polyline points="6,3.5 6,6 7.5,7.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>`;
    if (type === 'edit') return `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M9.5 2L11 3.5L4.5 10H3V8.5L9.5 2Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><line x1="8" y1="3.5" x2="9.5" y2="5" stroke="currentColor" stroke-width="1.3"/></svg>`;
    if (type === 'trash') return `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><polyline points="3,4 10,4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M5 4V3h3v1" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M4 4l.5 6h4L9 4" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>`;
  }

  // ── Render ─────────────────────────────────────────────
  function render() {
    const pending = tasks.filter(t => !t.done);
    const completed = tasks.filter(t => t.done);

    document.getElementById('stat-total').textContent = tasks.length;
    document.getElementById('stat-pending').textContent = pending.length;
    document.getElementById('stat-done').textContent = completed.length;
    document.getElementById('pendingCount').textContent = pending.length;
    document.getElementById('completedCount').textContent = completed.length;

    renderList('pendingList', 'pendingEmpty', pending, 'pending');
    renderList('completedList', 'completedEmpty', completed, 'completed');
  }

  function renderList(listId, emptyId, items, type) {
    const list = document.getElementById(listId);
    const empty = document.getElementById(emptyId);

    // Remove all task cards (keep empty state)
    Array.from(list.querySelectorAll('.task-card')).forEach(el => el.remove());

    if (items.length === 0) {
      empty.style.display = '';
      return;
    }
    empty.style.display = 'none';

    items.forEach(task => {
      const card = document.createElement('div');
      card.className = `task-card ${type}`;
      card.dataset.id = task.id;

      if (editingId === task.id) {
        card.innerHTML = `
          <div class="task-body">
            <textarea class="edit-input" id="editInput_${task.id}">${escHtml(task.text)}</textarea>
            <div class="edit-actions">
              <button class="btn-save" onclick="saveEdit('${task.id}')">Save</button>
              <button class="btn-cancel" onclick="cancelEdit()">Cancel</button>
            </div>
          </div>`;
        setTimeout(() => {
          const inp = document.getElementById(`editInput_${task.id}`);
          if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); autoResize(inp); }
        }, 0);
      } else {
        const completedMeta = task.completedAt
          ? `<span class="meta-item">${iconSVG('check',11)} Done ${fmtDate(task.completedAt)}</span>` : '';
        card.innerHTML = `
          <div class="task-check" onclick="toggleTask('${task.id}')" title="${type === 'pending' ? 'Mark complete' : 'Mark pending'}">
            ${iconSVG('check', 12)}
          </div>
          <div class="task-body">
            <div class="task-text">${escHtml(task.text)}</div>
            <div class="task-meta">
              <span class="meta-item">${iconSVG('clock',11)} Added ${fmtDate(task.createdAt)}</span>
              ${completedMeta}
            </div>
          </div>
          <div class="task-actions">
            <button class="action-btn edit" onclick="startEdit('${task.id}')" title="Edit">${iconSVG('edit',13)}</button>
            <button class="action-btn delete" onclick="deleteTask('${task.id}')" title="Delete">${iconSVG('trash',13)}</button>
          </div>`;
      }

      list.appendChild(card);
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Actions ────────────────────────────────────────────
  function addTask() {
    const inp = document.getElementById('taskInput');
    const text = inp.value.trim();
    if (!text) return;
    tasks.unshift({ id: genId(), text, done: false, createdAt: new Date().toISOString(), completedAt: null });
    inp.value = '';
    inp.style.height = '';
    save(); render();
  }

  function toggleTask(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    task.done = !task.done;
    task.completedAt = task.done ? new Date().toISOString() : null;
    save(); render();
  }

  function deleteTask(id) {
    const card = document.querySelector(`.task-card[data-id="${id}"]`);
    if (card) {
      card.classList.add('removing');
      card.addEventListener('animationend', () => {
        tasks = tasks.filter(t => t.id !== id);
        save(); render();
      }, { once: true });
    } else {
      tasks = tasks.filter(t => t.id !== id);
      save(); render();
    }
  }

  function startEdit(id) { editingId = id; render(); }
  function cancelEdit() { editingId = null; render(); }

  function saveEdit(id) {
    const inp = document.getElementById(`editInput_${id}`);
    if (!inp) return;
    const text = inp.value.trim();
    if (!text) return;
    const task = tasks.find(t => t.id === id);
    if (task) task.text = text;
    editingId = null;
    save(); render();
  }

  // ── Auto-resize textarea ───────────────────────────────
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  document.getElementById('taskInput').addEventListener('input', function() { autoResize(this); });
  document.getElementById('taskInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addTask(); }
  });
  document.getElementById('addBtn').addEventListener('click', addTask);

  // ── Date display ───────────────────────────────────────
  const now = new Date();
  document.getElementById('dateDisplay').textContent =
    now.toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  // ── Init ───────────────────────────────────────────────
  render();
</script>
</body>
</html>
